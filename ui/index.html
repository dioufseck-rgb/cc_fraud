<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFCU Fraud Operations Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }

    :root {
      --navy: #1e3a5f;
      --navy-light: #2c5282;
      --navy-dark: #152d4a;
    }

    .bg-navy { background-color: var(--navy); }
    .bg-navy-light { background-color: var(--navy-light); }
    .text-navy { color: var(--navy); }
    .border-navy { border-color: var(--navy); }

    /* Status badge animations */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

    /* Collapsible step body */
    .step-body { display: none; }
    .step-body.open { display: block; }

    /* Confidence bar */
    .conf-bar-fill { transition: width 0.4s ease; }

    /* Gate banner pulse */
    @keyframes gate-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(234,179,8,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(234,179,8,0); }
    }
    .gate-pulse { animation: gate-pulse 2s ease infinite; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Backlog item hover */
    .backlog-item { cursor: pointer; transition: background 0.15s; }
    .backlog-item:hover { background: #f8fafc; }
    .backlog-item.active { background: #eff6ff; border-left: 3px solid var(--navy); }

    /* Chain node */
    .chain-node {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 9999px; font-size: 12px;
      font-weight: 500; border: 1px solid;
    }

    /* Step card */
    .step-card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    .step-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer;
      background: #f8fafc;
      user-select: none;
    }
    .step-header:hover { background: #f1f5f9; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
    }
    .modal-overlay.hidden { display: none; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 20px; border-radius: 8px;
      background: #1e293b; color: white; font-size: 14px;
      font-weight: 500; opacity: 0; pointer-events: none;
      transition: opacity 0.3s; z-index: 100;
    }
    #toast.show { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body class="h-full bg-slate-100">

<!-- ═══════════════════════════════════════════════════════════════════
     HEADER
═══════════════════════════════════════════════════════════════════ -->
<div class="bg-navy text-white px-6 py-3 flex items-center justify-between shadow-md" style="height:52px">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-white/20 flex items-center justify-center text-sm font-bold">N</div>
    <span class="font-semibold tracking-wide text-sm">NFCU Fraud Operations Center</span>
  </div>
  <div class="flex items-center gap-4">
    <div id="gate-count-badge" class="hidden items-center gap-2 bg-yellow-500/20 text-yellow-200 px-3 py-1 rounded-full text-xs font-medium border border-yellow-400/30">
      <span class="w-2 h-2 rounded-full bg-yellow-400 pulse-dot"></span>
      <span id="gate-count-text">0 pending</span>
    </div>
    <div id="running-badge" class="hidden items-center gap-2 bg-blue-500/20 text-blue-200 px-3 py-1 rounded-full text-xs font-medium">
      <span class="w-2 h-2 rounded-full bg-blue-400 pulse-dot"></span>
      <span id="running-count-text">0 running</span>
    </div>
    <span class="text-slate-400 text-xs" id="last-refresh">–</span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     MAIN LAYOUT
═══════════════════════════════════════════════════════════════════ -->
<div class="flex" style="height: calc(100vh - 52px)">

  <!-- ── Sidebar: Case Backlog ──────────────────────────────────── -->
  <aside class="bg-white border-r border-slate-200 flex flex-col" style="width:260px;min-width:260px">
    <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Case Backlog</span>
      <span id="backlog-count" class="text-xs text-slate-400">–</span>
    </div>

    <div id="backlog-list" class="flex-1 overflow-y-auto py-1">
      <div class="px-4 py-8 text-center text-slate-400 text-sm">Loading...</div>
    </div>

    <div class="p-3 border-t border-slate-100">
      <button onclick="openSubmitModal()"
        class="w-full bg-navy text-white text-sm font-medium py-2 px-4 rounded-lg hover:bg-navy-light transition-colors flex items-center justify-center gap-2">
        <span class="text-lg leading-none">+</span> Submit Case
      </button>
    </div>
  </aside>

  <!-- ── Main: Case Detail ─────────────────────────────────────── -->
  <main class="flex-1 overflow-y-auto" id="main-panel">
    <div class="flex items-center justify-center h-full text-slate-400">
      <div class="text-center">
        <div class="text-4xl mb-3">🔍</div>
        <div class="font-medium">Select a case from the backlog</div>
        <div class="text-sm mt-1">or submit a new case to begin</div>
      </div>
    </div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     SUBMIT CASE MODAL
═══════════════════════════════════════════════════════════════════ -->
<div id="submit-modal" class="modal-overlay hidden">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4">
    <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
      <h2 class="font-semibold text-navy">Submit New Case</h2>
      <button onclick="closeSubmitModal()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
    </div>
    <div class="px-6 py-5 space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Case File</label>
        <select id="submit-case-file" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30">
          <option value="">Loading cases...</option>
        </select>
        <p id="submit-case-desc" class="mt-1 text-xs text-slate-500"></p>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Workflow</label>
          <input id="submit-workflow" value="fraud_triage" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Domain</label>
          <input id="submit-domain" value="fraud_triage" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
        </div>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
      <button onclick="closeSubmitModal()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancel</button>
      <button onclick="submitCase()" id="submit-btn"
        class="px-5 py-2 bg-navy text-white text-sm font-medium rounded-lg hover:bg-navy-light transition-colors">
        Run Workflow
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     APPROVE/REJECT CONFIRM MODAL
═══════════════════════════════════════════════════════════════════ -->
<div id="confirm-modal" class="modal-overlay hidden">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4">
    <div class="px-6 py-4 border-b border-slate-100">
      <h2 class="font-semibold text-navy" id="confirm-title">Confirm Action</h2>
    </div>
    <div class="px-6 py-4 space-y-3">
      <p class="text-sm text-slate-600" id="confirm-message"></p>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Analyst</label>
        <input id="confirm-analyst" value="analyst" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" id="confirm-notes-label">Notes</label>
        <textarea id="confirm-notes" rows="2" placeholder="Optional notes..." class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-navy/30 resize-none"></textarea>
      </div>
    </div>
    <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
      <button onclick="closeConfirmModal()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancel</button>
      <button onclick="executeConfirm()" id="confirm-action-btn"
        class="px-5 py-2 text-white text-sm font-medium rounded-lg transition-colors">
        Confirm
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     TOAST
═══════════════════════════════════════════════════════════════════ -->
<div id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
